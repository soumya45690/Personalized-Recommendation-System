<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Curved Slideshow</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #ece9e6, #ffffff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.carousel {
    position: relative;
    width: 100%;
    height: 340px;
}

/* Cards */
.card {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 190px;
    height: 260px;
    border-radius: 18px;
    object-fit: cover;
    transition: all 0.8s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ✨ OUTER (slightly faded + big) */
.pos0 { left: 10%; transform: translate(-50%, -50%) scale(1.3) rotateY(25deg); opacity: 0.7; }
.pos6 { left: 90%; transform: translate(-50%, -50%) scale(1.3) rotateY(-25deg); opacity: 0.7; }

/* SECOND */
.pos1 { left: 25%; transform: translate(-50%, -50%) scale(1.15) rotateY(15deg); opacity: 0.85; }
.pos5 { left: 75%; transform: translate(-50%, -50%) scale(1.15) rotateY(-15deg); opacity: 0.85; }

/* THIRD */
.pos2 { left: 40%; transform: translate(-50%, -50%) scale(1.0) rotateY(5deg); opacity: 0.95; }
.pos4 { left: 60%; transform: translate(-50%, -50%) scale(1.0) rotateY(-5deg); opacity: 0.95; }

/* 🔥 CENTER (highlight) */
.pos3 { 
    left: 50%; 
    transform: translate(-50%, -50%) scale(0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    opacity: 1;
}

/* ✨ subtle hover (optional but pro feel) */
.card:hover {
    transform: translate(-50%, -50%) scale(1.05);
    z-index: 10;
}
</style>
</head>

<body>

<div class="carousel">
    <img class="card pos0">
    <img class="card pos1">
    <img class="card pos2">
    <img class="card pos3">
    <img class="card pos4">
    <img class="card pos5">
    <img class="card pos6">
</div>

<script>
const images = [
    "https://picsum.photos/id/1011/300/400",
    "https://picsum.photos/id/1012/300/400",
    "https://picsum.photos/id/1013/300/400",
    "https://picsum.photos/id/1015/300/400",
    "https://picsum.photos/id/1016/300/400",
    "https://picsum.photos/id/1018/300/400",
    "https://picsum.photos/id/1020/300/400",
    "https://picsum.photos/id/1021/300/400",
    "https://picsum.photos/id/1022/300/400"
];

const cards = document.querySelectorAll(".card");

let start = 0;

function render() {
    cards.forEach((card, i) => {
        card.src = images[(start + i) % images.length];
    });
}

function slide() {
    start++;
    render();
}

render();
setInterval(slide, 2000);
</script>

</body>
</html>
