<!DOCTYPE html>
<html>
<head>
<title>Wheel Carousel</title>

<style>
body{
    margin:0;
    background:#f4f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    overflow:hidden;
}

.scene{
    width:100%;
    max-width:1200px;
    height:600px;
    perspective:1200px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carousel{
    position:relative;
    width:400px;
    height:400px;
    transform-style:preserve-3d;
    transition:transform 1.2s cubic-bezier(.25,.8,.25,1);
}

.card{
    position:absolute;
    width:220px;
    aspect-ratio:4/5;
    border-radius:20px;
    overflow:hidden;
    left:50%;
    top:50%;
    transform-origin:center -250px;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="scene">
    <div class="carousel" id="carousel">

        <div class="card"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2"></div>

    </div>
</div>

<script>

const carousel = document.getElementById("carousel");
const cards = document.querySelectorAll(".card");

const total = cards.length;
const angle = 360 / total;
let rotation = 0;

// Position cards in circle
cards.forEach((card,i)=>{
    card.style.transform =
        `rotateY(${i * angle}deg) translateZ(450px)`;
});

function rotateWheel(){
    rotation -= angle;
    carousel.style.transform =
        `rotateY(${rotation}deg)`;
}

setInterval(rotateWheel, 2500);

</script>

</body>
</html>
